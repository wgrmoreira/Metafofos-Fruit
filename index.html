<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MetaFrutas Pro - Edição Especial</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #111827, #1f2937);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 10px;
        }

        /* Título Alegre e Estilizado */
        h1 {
            font-family: 'Arial Black', Gadget, sans-serif;
            font-size: 2.6rem;
            background: linear-gradient(to bottom, #4ade80, #22c55e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 4px 6px rgba(0, 0, 0, 0.4)) drop-shadow(0px 0px 12px rgba(74, 222, 128, 0.4));
            margin-bottom: 8px;
            text-align: center;
            letter-spacing: 1px;
            transform: rotate(-1deg);
        }

        #painel-superior {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .info-box {
            font-size: 1.1rem;
            background: #374151;
            padding: 8px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 2px solid #4b5563;
            font-weight: bold;
            text-align: center;
        }

        #nivel-box {
            border-color: #4ade80;
            color: #4ade80;
        }

        #layout-jogo {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 500px;
            position: relative;
        }

        #container-barra {
            width: 20px;
            height: 380px;
            background: #1f2937;
            border: 2px solid #374151;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }

        #barra-progresso {
            width: 100%;
            height: 0%;
            background: linear-gradient(to top, #22c55e, #4ade80);
            border-radius: 8px;
            transition: height 0.3s ease;
            box-shadow: 0 0 10px rgba(74, 222, 128, 0.5);
        }

        #container-tabuleiro {
            flex: 1;
            aspect-ratio: 1 / 1;
            background: #1f2937;
            padding: 8px;
            border-radius: 16px;
            box-shadow: 0 12px 24px rgba(0,0,0,0.6);
            border: 3px solid #374151;
        }

        #tabuleiro {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 4px;
            width: 100%;
            height: 100%;
        }

        .quadrado {
            background: #2d3748;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2);
        }

        .morango { background: #991b1b; }
        .banana { background: #854d0e; }
        .melancia { background: #065f46; }
        .uva { background: #581c87; }
        .laranja { background: #9a3412; }
        .abacaxi { background: #b45309; }
        .cereja { background: #be123c; }
        .kiwi { background: #15803d; }
        .bomba { background: #374151; border: 2px dashed #f59e0b; font-size: 2rem !important; }
        
        .selecionado {
            outline: 4px solid #ffffff;
            box-shadow: 0 0 15px #ffffff;
            transform: scale(1.08);
            z-index: 10;
        }

        /* Textos de Combo Fofos e Animados */
        .combo-pop {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Comic Sans MS', 'Arial Black', sans-serif;
            font-size: 1.8rem;
            font-weight: bold;
            color: #fef08a;
            text-shadow: 2px 2px 0px #b45309, -2px -2px 0px #b45309, 2px -2px 0px #b45309, -2px 2px 0px #b45309, 0 4px 15px rgba(0,0,0,0.5);
            pointer-events: none;
            z-index: 50;
            animation: voarESumir 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes voarESumir {
            0% { transform: translate(-50%, 20px) scale(0.5); opacity: 0; }
            30% { transform: translate(-50%, -10px) scale(1.1); opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translate(-50%, -45px) scale(0.9); opacity: 0; }
        }

        @media (max-width: 440px) {
            #container-barra { height: 280px; width: 16px; }
            .quadrado { font-size: 1.4rem; border-radius: 6px; }
            h1 { font-size: 2rem; }
            .info-box { font-size: 0.9rem; padding: 6px 14px; }
            .combo-pop { font-size: 1.4rem; }
        }

        .paineis-botoes {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-game {
            background: #4b5563;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            transition: all 0.2s;
        }
        
        .btn-game.mutado {
            background: #1f2937;
            color: #9ca3af;
            border: 1px solid #4b5563;
        }

        .btn-save { background: #2563eb; }
        .btn-save:hover { background: #1d4ed8; }
        .btn-reset { background: #dc2626; }
        .btn-reset:hover { background: #b91c1c; }

        /* Rodapé de Créditos */
        .creditos {
            margin-top: 15px;
            font-size: 0.75rem;
            color: #9ca3af;
            letter-spacing: 0.5px;
            opacity: 0.8;
            text-align: center;
        }

        /* ---- MODAIS REFEITOS ---- */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(6px);
        }

        /* Modal de Nível Alegre e Festivo */
        #modal-alerta .modal-conteudo {
            background: linear-gradient(135deg, #1e1b4b, #311042);
            border: 4px solid #fef08a;
            border-radius: 24px;
            padding: 35px 25px;
            text-align: center;
            max-width: 360px;
            width: 100%;
            box-shadow: 0 0 30px rgba(254, 240, 138, 0.3), inset 0 0 15px rgba(254, 240, 138, 0.2);
            animation: surgirEQuicar 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) ease-out;
        }

        .modal-parabens-texto {
            font-family: 'Comic Sans MS', 'Arial Black', sans-serif;
            font-size: 1.4rem;
            color: #ffffff;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .modal-titulo-nivel {
            font-family: 'Arial Black', Gadget, sans-serif;
            font-size: 2.2rem;
            background: linear-gradient(to bottom, #fef08a, #facc15);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
            filter: drop-shadow(0px 4px 8px rgba(0, 0, 0, 0.5));
            display: block;
            line-height: 1.2;
        }

        .btn-modal-alegre {
            background: linear-gradient(to bottom, #4ade80, #22c55e);
            border: none;
            color: #ffffff;
            padding: 12px 35px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4), inset 0 -4px 0 rgba(0,0,0,0.2);
            transition: transform 0.1s, filter 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-modal-alegre:hover {
            filter: brightness(1.1);
        }

        .btn-modal-alegre:active {
            transform: scale(0.96);
        }

        /* Modal Game Over */
        #modal-gameover .modal-conteudo { 
            background: #1f2937;
            border: 3px solid #ef4444; 
            border-radius: 16px;
            padding: 30px 20px;
            text-align: center;
            max-width: 320px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            animation: surgir 0.3s ease-out;
        }
        #modal-gameover .modal-titulo { 
            font-size: 1.8rem;
            font-weight: bold;
            color: #ef4444; 
            margin-bottom: 15px;
        }
        .modal-detalhes {
            font-size: 1.1rem;
            color: #e5e7eb;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .btn-modal-padrao {
            background: #374151;
            border: 1px solid #4b5563;
            color: #ffffff;
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: bold;
            transition: all 0.2s;
        }

        @keyframes surgirEQuicar {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes surgir {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <h1>✨ MetaFrutas ✨</h1>
    
    <div id="painel-superior">
        <div class="info-box">Pontos: <span id="pontos-texto">0</span></div>
        <div class="info-box" id="nivel-box">Nível: <span id="nivel-texto">Cambaxirra</span></div>
    </div>
    
    <div id="layout-jogo">
        <div id="container-barra">
            <div id="barra-progresso"></div>
        </div>
        <div id="container-tabuleiro">
            <div id="tabuleiro"></div>
        </div>
    </div>

    <div class="paineis-botoes">
        <button id="btn-musica" class="btn-game mutado" onclick="alternarMusica()">🎵 Música: OFF</button>
        <button id="btn-efeitos" class="btn-game" onclick="alternarEfeitos()">🔊 Efeitos: ON</button>
        <button id="btn-salvar" class="btn-game btn-save" onclick="forcarSalvarProgresso()">💾 Salvar Progresso</button>
        <button class="btn-game btn-reset" onclick="deletarProgressoSalvo()">🔄 Resetar Jogo</button>
    </div>

    <div class="creditos">jogo desenvolvido por Wagner e Maria Helena</div>

    <div id="modal-alerta" class="modal">
        <div class="modal-conteudo">
            <div class="modal-parabens-texto">🎉 Parabéns! Você atingiu o</div>
            <div id="modal-texto-nivel" class="modal-titulo-nivel">Nível Exemplo</div>
            <button class="btn-modal-alegre" onclick="fecharModal()">Obter!</button>
        </div>
    </div>

    <div id="modal-gameover" class="modal">
        <div class="modal-conteudo">
            <div class="modal-titulo">Fim de Jogo!</div>
            <div id="gameover-detalhes" class="modal-detalhes"></div>
            <button class="btn-modal-padrao" onclick="reiniciarJogo()">Iniciar Novamente</button>
        </div>
    </div>

    <script>
        const layoutJogo = document.getElementById('layout-jogo');
        const tabuleiro = document.getElementById('tabuleiro');
        const placarTexto = document.getElementById('pontos-texto');
        const nivelTexto = document.getElementById('nivel-texto');
        const barraProgresso = document.getElementById('barra-progresso');
        const modalAlerta = document.getElementById('modal-alerta');
        const modalTextoNivel = document.getElementById('modal-texto-nivel');
        const modalGameOver = document.getElementById('modal-gameover');
        const gameoverDetalhes = document.getElementById('gameover-detalhes');
        const btnSalvar = document.getElementById('btn-salvar');
        
        const LARGURA = 8;
        let pontos = 0;
        let quadrados = [];
        
        let audioCtx = null;
        let musicaLigada = false;
        let efeitosLigados = true;
        let intervaloMusica = null;

        let marcosAlcancados = new Set();
        let proximoMarcoBomba = 500;

        let touchStartX = 0;
        let touchStartY = 0;
        let quadradoArrastadoId = null;

        const bancoFrutas = [
            { classe: 'morango', emoji: '🍓' },
            { classe: 'banana', emoji: '🍌' },
            { classe: 'melancia', emoji: '🍉' },
            { classe: 'uva', emoji: '🍇' },
            { classe: 'laranja', emoji: '🍊' },
            { classe: 'abacaxi', emoji: '🍍' }, 
            { classe: 'cereja', emoji: '🍒' },  
            { classe: 'kiwi', emoji: '🥝' }     
        ];

        const metasNiveis = [
            { min: 20000, nome: "Nivel Pica" },
            { min: 18000, nome: "Nível Wagner" },
            { min: 16000, nome: "Nível Veruska" },
            { min: 14000, nome: "Nível Morg" },
            { min: 12000, nome: "Nível Vitor" },
            { min: 10000, nome: "Nível Guilherme" },
            { min: 8000, nome: "Nível Coronel" },
            { min: 6000, nome: "Nível Will" },
            { min: 4000, nome: "Nivel Ramon" },
            { min: 2000, nome: "Nível Cap" },
            { min: 1500, nome: "Metafofos" },
            { min: 1000, nome: "Fofos" },
            { min: 500,  nome: "Meta" },
            { min: 0,    nome: "Cambaxirra" }
        ];

        function salvarProgresso() {
            const dadosDoJogo = {
                pontos: pontos,
                proximoMarcoBomba: proximoMarcoBomba,
                marcosAlcancados: Array.from(marcosAlcancados)
            };
            localStorage.setItem('metafrutas_savegame', JSON.stringify(dadosDoJogo));
        }

        function carregarProgressoSalvo() {
            const dadosSalvos = localStorage.getItem('metafrutas_savegame');
            if (dadosSalvos) {
                try {
                    const dadosParseados = JSON.parse(dadosSalvos);
                    pontos = dadosParseados.pontos || 0;
                    proximoMarcoBomba = dadosParseados.proximoMarcoBomba || 500;
                    marcosAlcancados = new Set(dadosParseados.marcosAlcancados || []);
                    return true;
                } catch (e) {
                    return false;
                }
            }
            return false;
        }

        function forcarSalvarProgresso() {
            salvarProgresso();
            btnSalvar.innerText = "✅ Progresso Salvo!";
            btnSalvar.style.background = "#10b981";
            setTimeout(() => {
                btnSalvar.innerText = "💾 Salvar Progresso";
                btnSalvar.style.background = "#2563eb";
            }, 1500);
        }

        function deletarProgressoSalvo() {
            if (confirm("Deseja apagar o progresso e recomeçar do zero?")) {
                localStorage.removeItem('metafrutas_savegame');
                pontos = 0;
                proximoMarcoBomba = 500;
                marcosAlcancados.clear();
                criarTabuleiro();
            }
        }

        function obterFrutasDisponiveis() {
            if (pontos >= 20000) return bancoFrutas; 
            if (pontos >= 15000) return bancoFrutas.slice(0, 8); 
            if (pontos >= 10000) return bancoFrutas.slice(0, 7); 
            if (pontos >= 5000) return bancoFrutas.slice(0, 6);  
            return bancoFrutas.slice(0, 5);                      
        }

        function inicializarAudioCtx() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function alternarMusica() {
            inicializarAudioCtx();
            musicaLigada = !musicaLigada;
            const btn = document.getElementById('btn-musica');
            if (musicaLigada) {
                btn.innerText = "🎵 Música: ON";
                btn.className = "btn-game";
                tocarMusicaFundo();
            } else {
                btn.innerText = "🎵 Música: OFF";
                btn.className = "btn-game mutado";
                clearInterval(intervaloMusica);
            }
        }

        function alternarEfeitos() {
            efeitosLigados = !efeitosLigados;
            const btn = document.getElementById('btn-efeitos');
            if (efeitosLigados) {
                btn.innerText = "🔊 Efeitos: ON";
                btn.className = "btn-game";
            } else {
                btn.innerText = "🔊 Efeitos: OFF";
                btn.className = "btn-game mutado";
            }
        }

        function tocarMusicaFundo() {
            clearInterval(intervaloMusica);
            const notas = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00];
            let index = 0;
            intervaloMusica = setInterval(() => {
                if (!audioCtx || !musicaLigada) return;
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(notas[index], audioCtx.currentTime);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1.8);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 1.8);
                index = (index + 1) % notas.length;
            }, 2000); 
        }

        function tocarSomCombo(tamanhoCombo) {
            if (!audioCtx || !efeitosLigados) return;
            let quantidadeNotas = tamanhoCombo === 3 ? 2 : tamanhoCombo === 4 ? 4 : 6;
            let frequenciaBase = tamanhoCombo === 3 ? 523.25 : tamanhoCombo === 4 ? 659.25 : 783.99;
            for (let i = 0; i < quantidadeNotas; i++) {
                setTimeout(() => {
                    if (!efeitosLigados) return;
                    let osc = audioCtx.createOscillator();
                    let gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(frequenciaBase + (i * 100), audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.15);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.15);
                }, i * 80);
            }
        }

        function tocarSomExplosao() {
            if (!audioCtx || !efeitosLigados) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(120, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 0.4);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
        }

        function exibirTextoFlutuante(tamanho) {
            let texto = "Meta ✨";
            if (tamanho === 4) texto = "Metafofos 💖";
            else if (tamanho === 5) text = "Super Metafofos 🌟";
            else if (tamanho >= 6) texto = "Maria Helena Combo 🔥";

            const pop = document.createElement('div');
            pop.className = 'combo-pop';
            pop.innerText = texto;
            layoutJogo.appendChild(pop);

            setTimeout(() => pop.remove(), 1200);
        }

        function criarTabuleiro() {
            tabuleiro.innerHTML = "";
            quadrados = [];
            const frutasAtuais = obterFrutasDisponiveis();
            
            for (let i = 0; i < LARGURA * LARGURA; i++) {
                const quadrado = document.createElement('div');
                quadrado.classList.add('quadrado');
                quadrado.setAttribute('id', i);
                
                const randomFruta = frutasAtuais[Math.floor(Math.random() * frutasAtuais.length)];
                quadrado.classList.add(randomFruta.classe);
                quadrado.innerText = randomFruta.emoji;
                
                // Eventos unificados para clique e toque
                quadrado.addEventListener('mousedown', iniciarArrasto);
                quadrado.addEventListener('touchstart', iniciarArrasto, { passive: true });

                tabuleiro.appendChild(quadrado);
                quadrados.push(quadrado);
            }

            let loops = 0;
            while (checarCombinacoes(false) && loops < 10) {
                for (let i = 0; i < LARGURA * LARGURA; i++) {
                    if (quadrados[i].innerText === '') {
                        const randomFruta = frutasAtuais[Math.floor(Math.random() * frutasAtuais.length)];
                        quadrados[i].className = `quadrado ${randomFruta.classe}`;
                        quadrados[i].innerText = randomFruta.emoji;
                    }
                }
                loops++;
            }

            atualizarInterface();
        }

        function iniciarArrasto(e) {
            inicializarAudioCtx();
            quadradoArrastadoId = parseInt(this.id);
            
            // CORREÇÃO CRÍTICA: Se clicar ou tocar diretamente na bomba, explode imediatamente!
            if (this.classList.contains('bomba')) {
                explodirBomba(quadradoArrastadoId);
                e.preventDefault();
                return;
            }

            if (e.type === 'touchstart') {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
                this.addEventListener('touchend', finalizarArrastoMovel, { once: true });
            } else {
                touchStartX = e.clientX;
                touchStartY = e.clientY;
                this.addEventListener('mouseup', finalizarArrastoPC, { once: true });
            }
        }

        function finalizarArrastoPC(e) {
            processarMovimento(e.clientX, e.clientY);
        }

        function finalizarArrastoMovel(e) {
            if (e.changedTouches && e.changedTouches.length > 0) {
                processarMovimento(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
            }
        }

        function processarMovimento(endX, endY) {
            let diffX = endX - touchStartX;
            let diffY = endY - touchStartY;
            let limiteMinimo = 25; 

            if (Math.abs(diffX) < limiteMinimo && Math.abs(diffY) < limiteMinimo) {
                tratarCliqueSimples(quadradoArrastadoId);
                return;
            }

            let direcaoId = null;
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 0 && (quadradoArrastadoId % LARGURA < LARGURA - 1)) direcaoId = quadradoArrastadoId + 1; 
                if (diffX < 0 && (quadradoArrastadoId % LARGURA > 0)) direcaoId = quadradoArrastadoId - 1; 
            } else {
                if (diffY > 0 && (quadradoArrastadoId < 56)) direcaoId = quadradoArrastadoId + LARGURA; 
                if (diffY < 0 && (quadradoArrastadoId > 7)) direcaoId = quadradoArrastadoId - LARGURA; 
            }

            if (direcaoId !== null) {
                tentarTrocarValida(quadradoArrastadoId, direcaoId);
            }
        }

        let quadradoSelecionadoId = null;
        function tratarCliqueSimples(idAtual) {
            if (quadradoSelecionadoId === null) {
                quadradoSelecionadoId = idAtual;
                quadrados[quadradoSelecionadoId].classList.add('selecionado');
            } else {
                const idAnterior = quadradoSelecionadoId;
                quadrados[idAnterior].classList.remove('selecionado');
                quadradoSelecionadoId = null;

                const movimentosValidos = [
                    idAnterior - 1, idAnterior + 1,
                    idAnterior - LARGURA, idAnterior + LARGURA
                ];
                const clicouNaBordaEsquerda = (idAnterior % LARGURA === 0 && idAtual === idAnterior - 1);
                const clicouNaBordaDireita = (idAnterior % LARGURA === LARGURA - 1 && idAtual === idAnterior + 1);

                if (movimentosValidos.includes(idAtual) && !clicouNaBordaEsquerda && !clicouNaBordaDireita) {
                    tentarTrocarValida(idAnterior, idAtual);
                }
            }
        }

        function tentarTrocarValida(id1, id2) {
            if (quadrados[id1].classList.contains('bomba') || quadrados[id2].classList.contains('bomba')) return;

            trocarQuadrados(id1, id2);
            setTimeout(() => {
                let temCombinacao = checarCombinacoes(true);
                if (!temCombinacao) {
                    trocarQuadrados(id1, id2); 
                } else {
                    salvarProgresso(); 
                }
            }, 200);
        }

        function trocarQuadrados(id1, id2) {
            const c1 = quadrados[id1].className; const t1 = quadrados[id1].innerText;
            quadrados[id1].className = quadrados[id2].className; quadrados[id1].innerText =  quadrados[id2].innerText;
            quadrados[id2].className = c1; quadrados[id2].innerText = t1;
        }

        function gerarBombaAleatoria() {
            let indexAleatorio = Math.floor(Math.random() * (LARGURA * LARGURA));
            quadrados[indexAleatorio].className = 'quadrado bomba';
            quadrados[indexAleatorio].innerText = '💣';
        }

        function explodirBomba(idBomba) {
            tocarSomExplosao();
            let linha = Math.floor(idBomba / LARGURA);
            let coluna = idBomba % LARGURA;
            let indicesParaApagar = [];

            for (let r = linha - 1; r <= linha + 1; r++) {
                for (let c = coluna - 1; c <= coluna + 1; c++) {
                    if (r >= 0 && r < LARGURA && c >= 0 && c < LARGURA) {
                        indicesParaApagar.push(r * LARGURA + c);
                    }
                }
            }

            pontos += (indicesParaApagar.length * 10); 
            indicesParaApagar.forEach(idx => esvaziarQuadrado(idx));
            
            atualizarInterface();
            salvarProgresso(); 
            setTimeout(derrubarQuadrados, 250);
        }

        function checarCombinacoes(contarPontos = true) {
            let combinou = false;
            let indicesParaApagar = new Set();

            // Horizontal
            for (let r = 0; r < LARGURA; r++) {
                let matchContador = 1; let matchTipo = ''; let matchIndices = [];
                for (let c = 0; c < LARGURA; c++) {
                    let idx = r * LARGURA + c;
                    let tipoAtual = obterClasse(quadrados[idx]);
                    if (c > 0 && tipoAtual === matchTipo && tipoAtual !== null) {
                        matchContador++; matchIndices.push(idx);
                    } else {
                        if (matchContador >= 3) {
                            matchIndices.forEach(id => indicesParaApagar.add(id));
                            if(contarPontos) {
                                calcularPontosCombo(matchContador);
                                exibirTextoFlutuante(matchContador);
                            }
                            combinou = true;
                        }
                        matchContador = 1; matchTipo = tipoAtual; matchIndices = [idx];
                    }
                }
                if (matchContador >= 3) {
                    matchIndices.forEach(id => indicesParaApagar.add(id));
                    if(contarPontos) {
                        calcularPontosCombo(matchContador);
                        exibirTextoFlutuante(matchContador);
                    }
                    combinou = true;
                }
            }

            // Vertical
            for (let c = 0; c < LARGURA; c++) {
                let matchContador = 1; let matchTipo = ''; let matchIndices = [];
                for (let r = 0; r < LARGURA; r++) {
                    let idx = r * LARGURA + c;
                    let tipoAtual = obterClasse(quadrados[idx]);
                    if (r > 0 && tipoAtual === matchTipo && tipoAtual !== null) {
                        matchContador++; matchIndices.push(idx);
                    } else {
                        if (matchContador >= 3) {
                            matchIndices.forEach(id => indicesParaApagar.add(id));
                            if(contarPontos) {
                                calcularPontosCombo(matchContador);
                                exibirTextoFlutuante(matchContador);
                            }
                            combinou = true;
                        }
                        matchContador = 1; matchTipo = tipoAtual; matchIndices = [idx];
                    }
                }
                if (matchContador >= 3) {
                    matchIndices.forEach(id => indicesParaApagar.add(id));
                    if(contarPontos) {
                        calcularPontosCombo(matchContador);
                        exibirTextoFlutuante(matchContador);
                    }
                    combinou = true;
                }
            }

            if (combinou) {
                indicesParaApagar.forEach(index => esvaziarQuadrado(index));
                if(contarPontos) atualizarInterface();
                setTimeout(derrubarQuadrados, 250);
            }
            return combinou;
        }

        function calcularPontosCombo(tamanho) {
            tocarSomCombo(tamanho);
            if (tamanho === 3) pontos += 10;
            else if (tamanho === 4) pontos += 30;
            else if (tamanho >= 5) pontos += 60;
        }

        function atualizarInterface() {
            placarTexto.innerText = pontos;
            
            let nivelAtual = metasNiveis[metasNiveis.length - 1];
            let proximoNivelMin = 500;

            for (let i = 0; i < metasNiveis.length; i++) {
                if (pontos >= metasNiveis[i].min) {
                    nivelAtual = metasNiveis[i];
                    proximoNivelMin = (i > 0) ? metasNiveis[i - 1].min : 20000;
                    break;
                }
            }

            nivelTexto.innerText = nivelAtual.nome;

            if (pontos >= 20000) {
                barraProgresso.style.height = "100%";
            } else {
                let piso = nivelAtual.min;
                let teto = proximoNivelMin;
                let porcentagem = ((pontos - piso) / (teto - piso)) * 100;
                barraProgresso.style.height = `${Math.min(Math.max(porcentagem, 0), 100)}%`;
            }

            if (pontos >= proximoMarcoBomba) {
                proximoMarcoBomba += 500;
                gerarBombaAleatoria();
            }

            if (nivelAtual.min > 0 && !marcosAlcancados.has(nivelAtual.min)) {
                marcosAlcancados.add(nivelAtual.min);
                abrirModal(nivelAtual.nome);
            }
        }

        function abrirModal(nomeNivel) {
            modalTextoNivel.innerText = `Nível "${nomeNivel}" 🚀`;
            modalAlerta.style.display = "flex";
        }

        function fecharModal() {
            modalAlerta.style.display = "none";
        }

        function obterClasse(quadrado) {
            if (!quadrado || quadrado.classList.contains('bomba')) return null;
            const todasClasses = Array.from(quadrado.classList);
            const frutaEncontrada = bancoFrutas.find(f => todasClasses.includes(f.classe));
            return frutaEncontrada ? frutaEncontrada.classe : null;
        }

        function esvaziarQuadrado(index) {
            quadrados[index].className = 'quadrado';
            quadrados[index].innerText = '';
        }

        function derrubarQuadrados() {
            const frutasAtuais = obterFrutasDisponiveis();

            for (let i = 0; i < 56; i++) {
                if (quadrados[i + LARGURA].innerText === '') {
                    const classeAtual = obterClasse(quadrados[i]);
                    if (classeAtual) {
                        const f = bancoFrutas.find(f => f.classe === classeAtual);
                        quadrados[i + LARGURA].className = `quadrado ${classeAtual}`;
                        quadrados[i + LARGURA].innerText = f.emoji;
                        esvaziarQuadrado(i);
                    }
                }
            }

            for (let i = 0; i < LARGURA; i++) {
                if (quadrados[i].innerText === '') {
                    const randomFruta = frutasAtuais[Math.floor(Math.random() * frutasAtuais.length)];
                    quadrados[i].className = `quadrado ${randomFruta.classe}`;
                    quadrados[i].innerText = randomFruta.emoji;
                }
            }

            if (quadrados.some(q => q.innerText === '')) {
                setTimeout(derrubarQuadrados, 80);
            } else {
                let teveMatch = checarCombinacoes(true);
                if (!teveMatch) {
                    verificarFimDeJogo();
                }
            }
        }

        function verificarFimDeJogo() {
            let temBombaDisponivel = quadrados.some(q => q.classList.contains('bomba'));
            if (temBombaDisponivel) return;

            let movimentoPossivel = false;

            function simulaEChecaMatch(id1, id2) {
                let c1 = quadrados[id1].className; let t1 = quadrados[id1].innerText;
                let c2 = quadrados[id2].className; let t2 = quadrados[id2].innerText;

                quadrados[id1].className = c2; quadrados[id1].innerText = t2;
                quadrados[id2].className = c1; quadrados[id2].innerText = t1;

                let temMatch = testeMatchLocal();

                quadrados[id1].className = c1; quadrados[id1].innerText = t1;
                quadrados[id2].className = c2; quadrados[id2].innerText = t2;

                return temMatch;
            }

            function testeMatchLocal() {
                for (let r = 0; r < LARGURA; r++) {
                    for (let c = 0; c < LARGURA - 2; c++) {
                        let i = r * LARGURA + c;
                        let t = obterClasse(quadrados[i]);
                        if (t && t === obterClasse(quadrados[i+1]) && t === obterClasse(quadrados[i+2])) return true;
                    }
                }
                for (let c = 0; c < LARGURA; c++) {
                    for (let r = 0; r < LARGURA - 2; r++) {
                        let i = r * LARGURA + c;
                        let t = obterClasse(quadrados[i]);
                        if (t && t === obterClasse(quadrados[i+LARGURA]) && t === obterClasse(quadrados[i+LARGURA*2])) return true;
                    }
                }
                return false;
            }

            for (let i = 0; i < LARGURA * LARGURA; i++) {
                let linha = Math.floor(i / LARGURA);
                let coluna = i % LARGURA;

                if (coluna < LARGURA - 1) {
                    if (simulaEChecaMatch(i, i + 1)) { movimentoPossivel = true; break; }
                }
                if (linha < LARGURA - 1) {
                    if (simulaEChecaMatch(i, i + LARGURA)) { movimentoPossivel = true; break; }
                }
            }

            if (!movimentoPossivel) {
                dispararGameOver();
            }
        }

        function dispararGameOver() {
            localStorage.removeItem('metafrutas_savegame');
            gameoverDetalhes.innerHTML = `
                Não há mais movimentos ou bombas disponíveis.<br><br>
                <strong>Pontuação Final:</strong> ${pontos} pontos<br>
                <strong>Nível Alcançado:</strong> ${nivelTexto.innerText}
            `;
            modalGameOver.style.display = "flex";
        }

        function reiniciarJogo() {
            pontos = 0;
            proximoMarcoBomba = 500;
            marcosAlcancados.clear();
            modalGameOver.style.display = "none";
            criarTabuleiro();
        }

        carregarProgressoSalvo();
        criarTabuleiro();
    </script>
